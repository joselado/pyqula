[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wannierpy"
version = "0.1.0"
description = "Maximally-localised Wannier functions in pure Python (with an optional Fortran/Wannier90 backend)"
readme = "README.md"
license = { text = "GPL-2.0-only" }
requires-python = ">=3.9"
authors = [
    { name = "Jose Lado", email = "jose.lado@aalto.fi" },
]
keywords = [
    "wannier functions",
    "wannier90",
    "condensed matter physics",
    "electronic structure",
    "dft",
    "maximally localised wannier functions",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU General Public License v2 (GPLv2)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Operating System :: OS Independent",
]
dependencies = ["numpy>=1.26"]

[project.optional-dependencies]
test = ["pytest"]

# No [project.urls] yet -- this repo has no git remote configured (`git remote -v`
# is empty), so there's no confirmed repository URL to publish. Add one here
# (Homepage/Repository/Issues) once the project has a real home, e.g.:
# [project.urls]
# Homepage = "https://github.com/<your-username>/wannierpy"
# Issues = "https://github.com/<your-username>/wannierpy/issues"

[tool.setuptools.packages.find]
include = ["wannier90*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
